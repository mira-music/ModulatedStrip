name: Build Modulated Strip

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # WINDOWS BUILD
  # ─────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone JUCE
        run: git clone --depth 1 https://github.com/juce-framework/JUCE.git

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Verify Windows build
        run: |
          echo "=== Windows Build Output ==="
          dir build\ModulatedStrip_artefacts\Release\VST3\ /s
          echo "Windows build OK"

      - name: Upload Windows VST3
        uses: actions/upload-artifact@v4
        with:
          name: ModulatedStrip-Windows-VST3
          path: build/ModulatedStrip_artefacts/Release/VST3/

  # ─────────────────────────────────────────
  # MAC BUILD + PKG INSTALLER + VERIFICATION
  # ─────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone JUCE
        run: git clone --depth 1 https://github.com/juce-framework/JUCE.git

      - name: Configure CMake (Universal Binary)
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build build --config Release

      - name: List build output
        run: |
          echo "=== All build directories ==="
          find build/ModulatedStrip_artefacts -type d -maxdepth 4
          echo ""
          echo "=== VST3 bundles ==="
          find build -name "*.vst3" -type d
          echo ""
          echo "=== AU bundles ==="
          find build -name "*.component" -type d
          echo ""
          echo "=== All binaries ==="
          find build -name "Modulated Strip" -type f

      - name: Create PKG installer structure
        run: |
          # Find built plugins dynamically
          VST3_PATH=$(find build -name "Modulated Strip.vst3" -type d | head -1)
          AU_PATH=$(find build -name "Modulated Strip.component" -type d | head -1)

          echo "Found VST3 at: $VST3_PATH"
          echo "Found AU at: $AU_PATH"

          # Fail if VST3 not found
          if [ -z "$VST3_PATH" ]; then
            echo "==============================="
            echo "ERROR: VST3 not found in build!"
            echo "==============================="
            echo "Full build directory listing:"
            find build -type d -maxdepth 6
            exit 1
          fi

          # Create staging directories
          mkdir -p pkg_root/Library/Audio/Plug-Ins/VST3
          mkdir -p pkg_root/Library/Audio/Plug-Ins/Components
          mkdir -p pkg_scripts
          mkdir -p pkg_resources

          # Copy VST3
          echo "Copying VST3..."
          cp -R "$VST3_PATH" "pkg_root/Library/Audio/Plug-Ins/VST3/"
          echo "VST3 copied ✅"

          # Copy AU if it exists
          if [ -n "$AU_PATH" ] && [ -d "$AU_PATH" ]; then
            echo "Copying AU..."
            cp -R "$AU_PATH" "pkg_root/Library/Audio/Plug-Ins/Components/"
            echo "AU copied ✅"
          else
            echo "AU not found - VST3 only build"
          fi

          # Verify copies
          echo ""
          echo "=== Staged files ==="
          find pkg_root -type f
          echo ""

          # Create postinstall script
          cat > pkg_scripts/postinstall << 'SCRIPT_END'
          #!/bin/bash
          # Create user presets directory
          PRESETS_DIR="$HOME/Library/Application Support/ModulatedStrip"
          mkdir -p "$PRESETS_DIR/Presets"

          # Force AU cache refresh for Logic Pro
          killall -9 AudioComponentRegistrar 2>/dev/null || true

          exit 0
          SCRIPT_END
          chmod +x pkg_scripts/postinstall

          # Create welcome text
          cat > pkg_resources/welcome.txt << 'TEXT_END'
          Welcome to Modulated Strip v1.0.0

          This installer will install the Modulated Strip
          analog channel processor plugin to your system.

          The following will be installed:
          - VST3 plugin (for Ableton Live, Bitwig, Studio One)
          - AU plugin (for Logic Pro, GarageBand) if available

          After installation, open your DAW and rescan plugins
          to find MODULATED STRIP.
          TEXT_END

          # Create license text
          cat > pkg_resources/license.txt << 'TEXT_END'
          MODULATED STRIP VST
          END USER LICENSE AGREEMENT

          Copyright 2026. All rights reserved.

          PERMITTED:
          - Use on any number of personal computers you own
          - Use in commercial music production
          - Use in live performances

          NOT PERMITTED:
          - Redistribute or resell the plugin
          - Reverse engineer the DSP algorithms
          - Remove copyright notices

          THE SOFTWARE IS PROVIDED AS IS WITHOUT WARRANTY
          OF ANY KIND, EXPRESS OR IMPLIED.

          By installing this software you agree to these terms.
          TEXT_END

          # Create conclusion text
          cat > pkg_resources/conclusion.txt << 'TEXT_END'
          Modulated Strip has been installed successfully!

          Next steps:
          1. Open your DAW (Ableton Live, Logic Pro, etc.)
          2. Rescan your plugins
          3. Find MODULATED STRIP in your plugin browser
          4. Drop it on any track
          5. Pick a preset and press play!

          If macOS blocks the plugin:
          Go to System Settings then Privacy and Security
          Click Allow Anyway next to the plugin message
          Then try opening the plugin again

          Need help or want to send feedback?
          Email: modulated.music.ofc@gmail.com
          Discord: miraofc2380_08940

          Thank you for testing!
          TEXT_END

          echo "PKG structure created ✅"

      - name: Build PKG installer
        run: |
          echo "=== Building component package ==="
          pkgbuild \
            --root pkg_root \
            --scripts pkg_scripts \
            --identifier com.modulatedstrip.vst \
            --version 1.0.0 \
            --install-location / \
            ModulatedStrip-component.pkg

          echo "Component package built ✅"
          echo ""

          # Create distribution XML
          cat > distribution.xml << 'XML_END'
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="2">
              <title>Modulated Strip v1.0.0</title>
              <organization>com.modulatedstrip</organization>
              <domains enable_localSystem="true"/>
              <options customize="never"
                       require-scripts="true"
                       rootVolumeOnly="true"/>
              <welcome    file="welcome.txt"/>
              <license    file="license.txt"/>
              <conclusion file="conclusion.txt"/>
              <choices-outline>
                  <line choice="default">
                      <line choice="com.modulatedstrip.vst"/>
                  </line>
              </choices-outline>
              <choice id="default"/>
              <choice id="com.modulatedstrip.vst"
                      visible="false">
                  <pkg-ref id="com.modulatedstrip.vst"/>
              </choice>
              <pkg-ref id="com.modulatedstrip.vst"
                       version="1.0.0"
                       onConclusion="none">
                  ModulatedStrip-component.pkg
              </pkg-ref>
          </installer-gui-script>
          XML_END

          echo "=== Building product package ==="
          productbuild \
            --distribution distribution.xml \
            --resources pkg_resources \
            --package-path . \
            "ModulatedStrip_v1.0.0_macOS.pkg"

          echo "Product package built ✅"

      - name: Verify PKG installer
        run: |
          echo "══════════════════════════════════════"
          echo "  PKG INSTALLER VERIFICATION"
          echo "══════════════════════════════════════"
          echo ""

          # Check PKG exists
          echo "--- Step 1: PKG file exists ---"
          if [ ! -f "ModulatedStrip_v1.0.0_macOS.pkg" ]; then
            echo "FAIL: PKG file not found!"
            exit 1
          fi
          ls -la ModulatedStrip_v1.0.0_macOS.pkg
          echo "PASS ✅"
          echo ""

          # Check PKG size
          echo "--- Step 2: PKG size check ---"
          FILE_SIZE=$(stat -f%z ModulatedStrip_v1.0.0_macOS.pkg)
          echo "Size: $FILE_SIZE bytes ($(($FILE_SIZE / 1024 / 1024)) MB)"
          if [ "$FILE_SIZE" -lt 100000 ]; then
            echo "FAIL: PKG is too small - likely empty or corrupt"
            exit 1
          fi
          echo "PASS ✅"
          echo ""

          # List PKG contents
          echo "--- Step 3: PKG payload contents ---"
          pkgutil --payload-files ModulatedStrip-component.pkg | head -30
          echo "..."
          TOTAL_FILES=$(pkgutil --payload-files ModulatedStrip-component.pkg | wc -l)
          echo "Total files in payload: $TOTAL_FILES"
          echo "PASS ✅"
          echo ""

          # Verify VST3 is inside
          echo "--- Step 4: VST3 inside PKG ---"
          if pkgutil --payload-files ModulatedStrip-component.pkg | grep -qi "vst3"; then
            echo "VST3 found in PKG payload"
            pkgutil --payload-files ModulatedStrip-component.pkg | grep -i "vst3"
            echo "PASS ✅"
          else
            echo "FAIL: VST3 not found in PKG payload!"
            echo "Full payload listing:"
            pkgutil --payload-files ModulatedStrip-component.pkg
            exit 1
          fi
          echo ""

          # Check for AU
          echo "--- Step 5: AU component check ---"
          if pkgutil --payload-files ModulatedStrip-component.pkg | grep -qi "component"; then
            echo "AU component found in PKG payload"
            pkgutil --payload-files ModulatedStrip-component.pkg | grep -i "component"
            echo "PASS ✅"
          else
            echo "NOTE: AU component not in payload (VST3-only build)"
            echo "SKIP (not required)"
          fi
          echo ""

          # Extract and verify PKG structure
          echo "--- Step 6: PKG extraction test ---"
          mkdir -p /tmp/pkg_verify
          cd /tmp/pkg_verify
          xar -xf "$OLDPWD/ModulatedStrip-component.pkg" 2>/dev/null
          if [ $? -eq 0 ]; then
            echo "PKG extracted successfully"
            ls -la
            echo "PASS ✅"
          else
            echo "WARNING: xar extraction had issues"
            echo "This may be normal for product archives"
          fi
          cd "$OLDPWD"
          echo ""

          # Test actual installation
          echo "--- Step 7: Installation test ---"
          echo "Running installer in test mode..."
          sudo installer -pkg "ModulatedStrip_v1.0.0_macOS.pkg" \
            -target / \
            -verboseR 2>&1 | tail -15
          INSTALL_RESULT=$?
          if [ $INSTALL_RESULT -eq 0 ]; then
            echo "Installation completed successfully"
            echo "PASS ✅"
          else
            echo "FAIL: Installation returned error code $INSTALL_RESULT"
            exit 1
          fi
          echo ""

          # Verify files installed correctly
          echo "--- Step 8: Verify installed files ---"
          echo ""
          echo "VST3 location:"
          if [ -d "/Library/Audio/Plug-Ins/VST3/Modulated Strip.vst3" ]; then
            echo "  /Library/Audio/Plug-Ins/VST3/Modulated Strip.vst3"
            find "/Library/Audio/Plug-Ins/VST3/Modulated Strip.vst3" -type f | head -10
            echo "  PASS ✅"
          else
            echo "  NOT FOUND ❌"
            echo "  Checking alternative locations..."
            find /Library/Audio/Plug-Ins -name "*.vst3" -type d 2>/dev/null
            exit 1
          fi
          echo ""

          echo "AU location:"
          if [ -d "/Library/Audio/Plug-Ins/Components/Modulated Strip.component" ]; then
            echo "  /Library/Audio/Plug-Ins/Components/Modulated Strip.component"
            echo "  PASS ✅"
          else
            echo "  NOT FOUND (VST3-only build - this is OK)"
            echo "  SKIP"
          fi
          echo ""

          # Verify binary architecture
          echo "--- Step 9: Binary architecture ---"
          BINARY=$(find "/Library/Audio/Plug-Ins/VST3/Modulated Strip.vst3" \
            -name "Modulated Strip" -type f 2>/dev/null | head -1)
          if [ -n "$BINARY" ]; then
            echo "Binary: $BINARY"
            echo ""
            echo "File type:"
            file "$BINARY"
            echo ""
            echo "Architectures:"
            lipo -info "$BINARY"
            echo ""

            # Check for universal binary
            if lipo -info "$BINARY" 2>/dev/null | grep -q "x86_64"; then
              echo "Intel (x86_64): ✅"
            else
              echo "Intel (x86_64): ❌ MISSING"
            fi

            if lipo -info "$BINARY" 2>/dev/null | grep -q "arm64"; then
              echo "Apple Silicon (arm64): ✅"
            else
              echo "Apple Silicon (arm64): ❌ MISSING"
            fi

            echo "PASS ✅"
          else
            echo "Binary not found inside VST3 bundle ❌"
            echo "Bundle contents:"
            find "/Library/Audio/Plug-Ins/VST3/Modulated Strip.vst3" -type f
            exit 1
          fi
          echo ""

          # Check binary loads
          echo "--- Step 10: Binary load test ---"
          if file "$BINARY" | grep -q "Mach-O"; then
            echo "Valid Mach-O binary"
            echo "PASS ✅"
          else
            echo "Not a valid Mach-O binary ❌"
            file "$BINARY"
            exit 1
          fi
          echo ""

          # Summary
          echo "══════════════════════════════════════"
          echo "  ALL VERIFICATION PASSED ✅"
          echo "══════════════════════════════════════"
          echo ""
          echo "  PKG file:        OK"
          echo "  PKG size:        $(($FILE_SIZE / 1024 / 1024)) MB"
          echo "  VST3 in payload: OK"
          echo "  Installation:    OK"
          echo "  Files in place:  OK"
          echo "  Binary valid:    OK"
          echo ""
          echo "  This PKG is ready for distribution"
          echo "══════════════════════════════════════"

      - name: Upload macOS PKG Installer
        uses: actions/upload-artifact@v4
        with:
          name: ModulatedStrip-macOS-Installer
          path: ModulatedStrip_v1.0.0_macOS.pkg

      - name: Upload macOS VST3 standalone
        uses: actions/upload-artifact@v4
        with:
          name: ModulatedStrip-macOS-VST3
          path: pkg_root/Library/Audio/Plug-Ins/VST3/

  # ─────────────────────────────────────────
  # CREATE RELEASE (on version tags only)
  # ─────────────────────────────────────────
  create-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release files
        run: |
          # Zip Windows VST3
          cd ModulatedStrip-Windows-VST3
          zip -r ../ModulatedStrip_v1.0.0_Windows.zip .
          cd ..

          # Copy Mac PKG
          cp ModulatedStrip-macOS-Installer/ModulatedStrip_v1.0.0_macOS.pkg .

          # Zip Mac VST3 for manual install
          cd ModulatedStrip-macOS-VST3
          zip -r ../ModulatedStrip_v1.0.0_macOS_VST3.zip .
          cd ..

          echo "=== Release files ==="
          ls -la *.zip *.pkg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Modulated Strip v1.0.0 Beta"
          body: |
            ## Modulated Strip v1.0.0 Beta

            Analog channel processor for electronic music production and live performance.

            ### Downloads

            **Windows:**
            - `ModulatedStrip_v1.0.0_Windows.zip` — VST3 plugin

            **macOS:**
            - `ModulatedStrip_v1.0.0_macOS.pkg` — **Wizard installer (recommended)**
            - `ModulatedStrip_v1.0.0_macOS_VST3.zip` — Manual install

            ### Windows Installation
            1. Unzip and copy `Modulated Strip.vst3` to `C:\Program Files\Common Files\VST3\`
            2. Or use the Windows installer from Dropbox

            ### macOS Installation
            1. Download the `.pkg` file
            2. Double-click to run the installer
            3. Follow the wizard and enter your password
            4. Open your DAW and rescan plugins
            5. If blocked: System Settings → Privacy & Security → Allow Anyway

            ### Features
            - 7 saturation models (Neve, SSL, API, Tube, Tape, FET, Iron)
            - 5 compressors (SSL Bus, Fairchild 670, LA-2A, 1176, API 2500)
            - 5 EQ models (Neve 1073, SSL 4000E, Pultec EQP-1A, API 550A)
            - 60+ factory presets
            - Oversampling up to 8x
            - Mid/Side processing
            - Delta mode, analog bypass, A/B comparison
            - LUFS metering, EQ curve display
            - Inter-channel crosstalk and model noise floors

            ### Feedback
            - Email: modulated.music.ofc@gmail.com
            - Discord: miraofc2380_08940

          files: |
            ModulatedStrip_v1.0.0_Windows.zip
            ModulatedStrip_v1.0.0_macOS.pkg
            ModulatedStrip_v1.0.0_macOS_VST3.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}