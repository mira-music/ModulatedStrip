name: Build Modulated Strip

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # WINDOWS BUILD
  # ─────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone JUCE
        run: git clone --depth 1 https://github.com/juce-framework/JUCE.git

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Upload Windows VST3
        uses: actions/upload-artifact@v4
        with:
          name: ModulatedStrip-Windows-VST3
          path: build/ModulatedStrip_artefacts/Release/VST3/

      - name: Upload Windows Standalone
        uses: actions/upload-artifact@v4
        with:
          name: ModulatedStrip-Windows-Standalone
          path: build/ModulatedStrip_artefacts/Release/Standalone/

  # ─────────────────────────────────────────
  # MAC BUILD (Intel + Apple Silicon)
  # ─────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone JUCE
        run: git clone --depth 1 https://github.com/juce-framework/JUCE.git

      - name: Configure CMake (Universal Binary)
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Build Release
        run: cmake --build build --config Release

      - name: Upload macOS VST3
        uses: actions/upload-artifact@v4
        with:
          name: ModulatedStrip-macOS-VST3
          path: build/ModulatedStrip_artefacts/Release/VST3/

      - name: Upload macOS AU
        uses: actions/upload-artifact@v4
        with:
          name: ModulatedStrip-macOS-AU
          path: build/ModulatedStrip_artefacts/Release/AU/

      - name: Upload macOS Standalone
        uses: actions/upload-artifact@v4
        with:
          name: ModulatedStrip-macOS-Standalone
          path: build/ModulatedStrip_artefacts/Release/Standalone/

  # ─────────────────────────────────────────
  # CREATE RELEASE (only on version tags)
  # ─────────────────────────────────────────
  create-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Zip Windows
        run: |
          cd ModulatedStrip-Windows-VST3
          zip -r ../ModulatedStrip-Windows-VST3.zip .

      - name: Zip macOS VST3
        run: |
          cd ModulatedStrip-macOS-VST3
          zip -r ../ModulatedStrip-macOS-VST3.zip .

      - name: Zip macOS AU
        run: |
          cd ModulatedStrip-macOS-AU
          zip -r ../ModulatedStrip-macOS-AU.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ModulatedStrip-Windows-VST3.zip
            ModulatedStrip-macOS-VST3.zip
            ModulatedStrip-macOS-AU.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}