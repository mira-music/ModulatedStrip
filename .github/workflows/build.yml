name: Build Modulated Strip

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone JUCE
        run: git clone --depth 1 https://github.com/juce-framework/JUCE.git

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Upload Windows VST3
        uses: actions/upload-artifact@v4
        with:
          name: ModulatedStrip-Windows-VST3
          path: build/ModulatedStrip_artefacts/Release/VST3/

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone JUCE
        run: git clone --depth 1 https://github.com/juce-framework/JUCE.git

      - name: Configure CMake (Universal Binary)
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build build --config Release

      - name: List build output
        run: |
          echo "=== Build artefacts ==="
          find build/ModulatedStrip_artefacts -type d -maxdepth 4
          echo "=== VST3 files ==="
          find build -name "*.vst3" -type d
          echo "=== AU files ==="
          find build -name "*.component" -type d

      - name: Create PKG installer structure
        run: |
          VST3_PATH=$(find build -name "Modulated Strip.vst3" -type d | head -1)
          AU_PATH=$(find build -name "Modulated Strip.component" -type d | head -1)
          
          echo "VST3 path: $VST3_PATH"
          echo "AU path: $AU_PATH"
          
          if [ -z "$VST3_PATH" ]; then
            echo "ERROR: VST3 not found in build output"
            find build -type d -maxdepth 5
            exit 1
          fi
          
          mkdir -p pkg_root/Library/Audio/Plug-Ins/VST3
          mkdir -p pkg_root/Library/Audio/Plug-Ins/Components
          mkdir -p pkg_scripts
          mkdir -p pkg_resources
          
          cp -R "$VST3_PATH" "pkg_root/Library/Audio/Plug-Ins/VST3/"
          
          if [ -n "$AU_PATH" ] && [ -d "$AU_PATH" ]; then
            cp -R "$AU_PATH" "pkg_root/Library/Audio/Plug-Ins/Components/"
          fi
          
          cat > pkg_scripts/postinstall << 'EOF'
          #!/bin/bash
          mkdir -p "$HOME/Library/Application Support/ModulatedStrip/Presets"
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          exit 0
          EOF
          chmod +x pkg_scripts/postinstall
          
          cat > pkg_resources/welcome.txt << 'EOF'
          Welcome to Modulated Strip v1.0.0
          
          This installer will install the Modulated Strip
          analog channel processor plugin to your system.
          
          The following will be installed:
          - VST3 plugin (for Ableton, Bitwig, Studio One)
          - AU plugin (for Logic Pro, GarageBand)
          
          After installation, open your DAW and rescan plugins
          to find MODULATED STRIP.
          EOF
          
          cat > pkg_resources/license.txt << 'EOF'
          MODULATED STRIP VST - END USER LICENSE AGREEMENT
          
          Copyright 2026. All rights reserved.
          
          PERMITTED:
          - Use on any number of personal computers you own
          - Use in commercial music production
          - Include in live performances
          
          NOT PERMITTED:
          - Redistribute or resell the plugin
          - Reverse engineer the DSP algorithms
          - Remove copyright notices
          
          THE SOFTWARE IS PROVIDED AS IS WITHOUT WARRANTY.
          By installing this software you agree to these terms.
          EOF
          
          cat > pkg_resources/conclusion.txt << 'EOF'
          Modulated Strip has been installed successfully!
          
          Next steps:
          1. Open your DAW (Ableton Live, Logic Pro, etc.)
          2. Rescan your plugins
          3. Find MODULATED STRIP
          4. Drop it on any track
          5. Pick a preset and press play!
          
          If macOS blocks the plugin:
          System Settings - Privacy and Security
          Click Allow Anyway next to the plugin message
          
          Feedback:
          Email: modulated.music.ofc@gmail.com
          Discord: miraofc2380_08940
          EOF

      - name: Build PKG installer
        run: |
          pkgbuild \
            --root pkg_root \
            --scripts pkg_scripts \
            --identifier com.modulatedstrip.vst \
            --version 1.0.0 \
            --install-location / \
            ModulatedStrip-component.pkg
          
          cat > distribution.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="2">
              <title>Modulated Strip v1.0.0</title>
              <organization>com.modulatedstrip</organization>
              <domains enable_localSystem="true"/>
              <options customize="never" require-scripts="true"
                       rootVolumeOnly="true"/>
              <welcome    file="welcome.txt"/>
              <license    file="license.txt"/>
              <conclusion file="conclusion.txt"/>
              <choices-outline>
                  <line choice="default">
                      <line choice="com.modulatedstrip.vst"/>
                  </line>
              </choices-outline>
              <choice id="default"/>
              <choice id="com.modulatedstrip.vst"
                      visible="false">
                  <pkg-ref id="com.modulatedstrip.vst"/>
              </choice>
              <pkg-ref id="com.modulatedstrip.vst"
                       version="1.0.0"
                       onConclusion="none">
                  ModulatedStrip-component.pkg
              </pkg-ref>
          </installer-gui-script>
          EOF
          
          productbuild \
            --distribution distribution.xml \
            --resources pkg_resources \
            --package-path . \
            "ModulatedStrip_v1.0.0_macOS.pkg"

      - name: Upload macOS PKG Installer
        uses: actions/upload-artifact@v4
        with:
          name: ModulatedStrip-macOS-Installer
          path: ModulatedStrip_v1.0.0_macOS.pkg

      - name: Upload macOS VST3
        uses: actions/upload-artifact@v4
        with:
          name: ModulatedStrip-macOS-VST3
          path: pkg_root/Library/Audio/Plug-Ins/VST3/

  create-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release files
        run: |
          cd ModulatedStrip-Windows-VST3
          zip -r ../ModulatedStrip_v1.0.0_Windows.zip .
          cd ..
          cp ModulatedStrip-macOS-Installer/ModulatedStrip_v1.0.0_macOS.pkg .
          cd ModulatedStrip-macOS-VST3
          zip -r ../ModulatedStrip_v1.0.0_macOS_VST3.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Modulated Strip v1.0.0 Beta"
          body: |
            ## Modulated Strip v1.0.0 Beta
            
            Analog channel processor for electronic music.
            
            ### Downloads
            
            **Windows:**
            - `ModulatedStrip_v1.0.0_Windows.zip` - VST3 plugin
            
            **macOS:**
            - `ModulatedStrip_v1.0.0_macOS.pkg` - **Installer (recommended)**
            - `ModulatedStrip_v1.0.0_macOS_VST3.zip` - Manual install
            
            ### macOS Install
            1. Download the .pkg file
            2. Double-click to run installer
            3. Enter your password when asked
            4. Open DAW and rescan plugins
            5. If blocked: System Settings - Security - Allow
            
            ### Feedback
            - Email: modulated.music.ofc@gmail.com
            - Discord: miraofc2380_08940
          files: |
            ModulatedStrip_v1.0.0_Windows.zip
            ModulatedStrip_v1.0.0_macOS.pkg
            ModulatedStrip_v1.0.0_macOS_VST3.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}